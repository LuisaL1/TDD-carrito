services:

  db:
    image: postgres:16-alpine
    container_name: carrito-db
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: secret123
      POSTGRES_DB: carrito
    volumes:
      - datos-postgres:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d carrito"]
      interval: 5s
      timeout: 5s
      retries: 10

  app:
    build: .
    container_name: carrito-app
    environment:
      DB_HOST: db
      DB_PORT: 5432
      DB_NAME: carrito
      DB_USER: postgres
      DB_PASSWORD: secret123
    ports:
      - "5000:5000"
    depends_on:
      db:
        condition: service_healthy

volumes:
  datos-postgres: